<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Leaderboard</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container" id="leaderboard"></div>

 <div class="card">
  <img class="thumbnail" src="assets/images/space.jpg">

  <div class="info">
    <div class="top-row">
      <div class="rank">#1</div>
      <div class="title">Thinking Space II</div>
    </div>

    <div class="meta">
      <span class="creator">CairoX</span>
      <span>|</span>
      <span class="highlight">Zoink</span>
      <span class="dot">•</span>
      <span class="points">250 – 1000 pts</span>
    </div>
  </div>
</div>

</body>
</html>

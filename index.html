<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Global CE Leaderboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
  <div class="nav-left">
    <span class="logo">🌐</span>
    <span class="title-text">Global CE Leaderboard</span>
  </div>

  <div class="nav-right">
    <a href="https://discord.gg/Q3q6DJWG" target="_blank" rel="noopener noreferrer">
      Join the LB
    </a>
  </div>
</div>

<div class="container" id="leaderboard"></div>

<script>
const data = [
  {
    rank: 1,
    title: "Bonekoko",
    creator: "Roblox User: Wouidzy",
    verifier: "Clan: Valhalla",
    points: "Event Wins: 18",
    img: "assets/images/bonekoko.jpg"
  },
  {
    rank: 2,
    title: "Raze",
    creator: "Roblox User: gg_razegg",
    verifier: "Clan: RoS",
    points: "Event Wins: 2",
    img: "assets/images/raze.jpg"
  },
  {
    rank: 3,
    title: "Cevokud",
    creator: "Roblox User: Cevokud",
    verifier: "Clan: RoS",
    points: "Event Wins: 3",
    img: "assets/images/cevo.jpg"
  },
  {
    rank: 4,
    title: "Ryaan",
    creator: "Roblox User: supermanzzxz3",
    verifier: "Clan: Valhalla",
    points: "Event Wins: 3",
    img: "assets/images/ryaan.jpg"
  },
  {
    rank: 5,
    title: "Babatunde",
    creator: "Roblox User: 121111deasd",
    verifier: "Clan: Valhalla",
    points: "Event Wins: 3",
    img: "assets/images/baba.jpg"
  },
  {
    rank: 6,
    title: "Sai",
    creator: "Roblox User: sai_zzzzzzz",
    verifier: "Clan: RoS",
    points: "Event Wins: 1",
    img: "assets/images/sai.jpg"
  },
  {
    rank: 7,
    title: "Bondt",
    creator: "Roblox User: lucky_jaguar668",
    verifier: "Clan: Valhalla",
    points: "Event Wins: 1",
    img: "assets/images/bondt.jpg"
  },
  {
    rank: 8,
    title: "Shuljo",
    creator: "Roblox User: Pametansam",
    verifier: "Clan: RoS",
    points: "Event Wins: 0",
    img: "assets/images/shuljo.jpg"
  },
  {
    rank: 9,
    title: "Rotgel",
    creator: "Roblox User: R0TGEL",
    verifier: "Clan: RoS",
    points: "Event Wins: 19",
    img: "assets/images/rotgel.jpg"
  },
  {
    rank: 10,
    title: "Ananas",
    creator: "Roblox User: Ananasparon",
    verifier: "Clan: RoS",
    points: "Event Wins: 1",
    img: "assets/images/ananas.jpg"
  }
];

const container = document.getElementById("leaderboard");

data.forEach(item => {
  const card = document.createElement("div");
  card.className = "card";

 card.innerHTML = `
  <div class="thumb-wrap">
    <img class="thumbnail" src="${item.img}">
  </div>

  <div class="info">
    <div class="top-row">
      <div class="rank">#${item.rank}</div>
      <div class="title ${item.gradient ? 'gradient' : ''}">
        ${item.title}
      </div>
    </div>

    <div class="meta">
      <span class="creator">${item.creator}</span>
      <span>|</span>
      <span class="highlight">${item.verifier}</span>
    </div>
  </div>

  <div class="points">${item.points}</div>
`;

  /* mouse glow tracking */
  card.addEventListener("mousemove", e => {
    const rect = card.getBoundingClientRect();
    card.style.setProperty("--x", (e.clientX - rect.left) + "px");
    card.style.setProperty("--y", (e.clientY - rect.top) + "px");
  });

  container.appendChild(card);
});
</script>

</body>
</html>

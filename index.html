<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Leaderboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- Card 1 -->
  <div class="card">
    <img class="thumbnail" src="assets/images/space.jpg">
    <div class="info">
      <div class="rank">#1</div>
      <div class="title">Thinking Space II</div>
      <div class="meta">CairoX | Zoink</div>
    </div>
    <div class="points">250 - 1000 pts</div>
  </div>

  <!-- Card 2 -->
  <div class="card">
    <img class="thumbnail" src="assets/images/amethyst.jpg">
    <div class="info">
      <div class="rank">#2</div>
      <div class="title">Amethyst</div>
      <div class="meta">iMist | wPopoff</div>
    </div>
    <div class="points">240 - 960 pts</div>
  </div>

  <!-- Card 3 -->
  <div class="card">
    <img class="thumbnail" src="assets/images/flamewall.jpg">
    <div class="info">
      <div class="rank">#3</div>
      <div class="title">Flamewall</div>
      <div class="meta">UNarwall | CuatrocientosYT</div>
    </div>
    <div class="points">230 - 920 pts</div>
  </div>

  <!-- Card 4 -->
  <div class="card">
    <img class="thumbnail" src="assets/images/tidalwave.jpg">
    <div class="info">
      <div class="rank">#4</div>
      <div class="title">Tidal Wave</div>
      <div class="meta">OniLinkGD | Zoink</div>
    </div>
    <div class="points">220 - 880 pts</div>
  </div>

</div>

</body>
</html>
